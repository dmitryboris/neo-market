name: MOD

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - US-MOD-01.py
          - US-MOD-03.py
          - US-MOD-04.py
          - US-MOD-05.py


    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moderation
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r moderation/requirements.txt
          pip install -r moderation/requirements-test.txt

      - name: Prepare environment
        run: |
          cp .env.example moderation/.env
          sed -i 's/DB_HOST=.*/DB_HOST=localhost/' moderation/.env
          pip install ./shared

      - name: Run ${{ matrix.test-file }}
        working-directory: moderation
        run: pytest --asyncio-mode=auto tests/${{ matrix.test-file }} -v