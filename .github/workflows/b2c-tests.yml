name: B2C

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - US-B2C-CAT-01.py
          - US-B2C-CAT-03.py
          - US-B2C-CART-03.py
          - US-B2C-ORD-01.py
          - US-B2C-ORD-03.py

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: b2c
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r b2c/requirements.txt
          pip install -r b2c/requirements-test.txt

      - name: Prepare environment
        run: |
          cp .env.example b2c/.env
          sed -i 's/DB_HOST=.*/DB_HOST=localhost/' b2c/.env
          pip install ./shared

      - name: Run ${{ matrix.test-file }}
        working-directory: b2c
        run: pytest --asyncio-mode=auto tests/${{ matrix.test-file }} -v