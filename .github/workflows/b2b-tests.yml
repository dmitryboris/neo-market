name: Run tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: b2b_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r b2b/requirements.txt
          pip install -r b2b/requirements-test.txt

      - name: Prepare environment
        run: |
          cp .env.example b2b/.env
          sed -i 's/DB_HOST=.*/DB_HOST=localhost/' .env

      - name: Run tests
        working-directory: b2b
        run: pytest --asyncio-mode=auto tests -v