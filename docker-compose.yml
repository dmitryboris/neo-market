services:
  b2b_db:
    image: postgres:18-alpine
    container_name: "b2b-postgres"
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - b2b_pg_data:/var/lib/postgresql
    ports:
      - "$DB_PORT:5432"

volumes:
  b2b_pg_data:
